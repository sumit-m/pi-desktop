name: Build

# Nothing builds on a normal push. Builds are manual: a workflow dispatch
# (Actions tab / gh CLI) builds all three platforms and uploads the
# installers as artifacts — no release. Pushing a version tag (e.g.
# v0.0.3-alpha), the deliberate "create a release" step, builds all three
# and publishes a GitHub prerelease.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Cancel superseded runs for the same ref to save runner time.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            eb_args: '--linux AppImage'
            artifacts: |
              release/*.AppImage
          - os: windows-latest
            eb_args: '--win nsis portable'
            artifacts: |
              release/*.exe
          - os: macos-latest
            eb_args: '--mac dmg zip'
            artifacts: |
              release/*.dmg
              release/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-pty's bundled conpty needs Microsoft's Spectre-mitigated MSVC
      # libraries to compile on Windows. This stable (non-version-pinned)
      # component installs the latest matching libs before the rebuild runs
      # in `npm ci` (postinstall -> electron-builder install-app-deps).
      - name: Install Spectre-mitigated libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          $args = @(
            'modify',
            '--installPath', "`"$installPath`"",
            '--add', 'Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre',
            '--quiet', '--norestart', '--nocache'
          )
          $p = Start-Process -FilePath "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
            -ArgumentList $args -Wait -PassThru
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            Write-Error "vs_installer exited with $($p.ExitCode)"
            exit $p.ExitCode
          }

      # Runs postinstall, which rebuilds native modules (node-pty) for Electron.
      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build renderer/main/preload
        run: npm run build

      - name: Package with electron-builder
        shell: bash
        run: npx --no-install electron-builder ${{ matrix.eb_args }} --publish never
        env:
          # No certificates in alpha — don't attempt to sign the macOS app.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish prerelease
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/**/*
