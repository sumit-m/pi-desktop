name: Bug report
description: Something's broken or behaving wrong
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you give, the faster we can fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
      placeholder: "When I clicked X, the app did Y, but I expected Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Tell us how to make the bug happen again.
      placeholder: |
        1. Open PI Desktop
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (AppImage)
        - Windows (portable .exe)
        - Built from source
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: "e.g. Ubuntu 24.04, Fedora 40, Windows 11 22H2"
    validations:
      required: true

  - type: input
    id: pi-desktop-version
    attributes:
      label: PI Desktop version
      description: "Find it in Settings > About or the title bar. Example: 0.0.1-alpha"
    validations:
      required: true

  - type: input
    id: pi-version
    attributes:
      label: PI agent version
      description: "Run `pi --version` in a terminal. If PI isn't installed, write 'not installed'."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: |
        Anything from the DevTools console (View > Toggle DevTools), the terminal you launched the app from, or an on-screen error.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag-and-drop images here if they help show the problem.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I'm on the latest release listed at https://github.com/FaqFirebase/pi-desktop/releases
          required: true
